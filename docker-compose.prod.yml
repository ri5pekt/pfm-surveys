version: "3.8"

services:
    postgres:
        image: postgres:16-alpine
        restart: unless-stopped
        environment:
            POSTGRES_DB: ${DATABASE_NAME}
            POSTGRES_USER: ${DATABASE_USER}
            POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./backups:/backups
        ports:
            # Explicit localhost-only binding (defense-in-depth, don't rely on base file inheritance).
            # Never expose Postgres on 0.0.0.0 in production — see DEPLOY.md Security section.
            - "127.0.0.1:${DATABASE_PORT:-5432}:5432"
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER}"]
            interval: 30s
            timeout: 5s
            retries: 5
        networks:
            - backend

    redis:
        image: redis:7-alpine
        restart: unless-stopped
        # REDIS_PASSWORD MUST be set to a strong, unique value in production .env.
        command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction --requirepass ${REDIS_PASSWORD:-devpassword_change_in_prod}
        ports:
            # Explicit localhost-only binding (defense-in-depth, don't rely on base file inheritance).
            # Never expose Redis on 0.0.0.0 in production — see DEPLOY.md Security section.
            - "127.0.0.1:${REDIS_PORT:-6379}:6379"
        volumes:
            - redis_data:/data
        healthcheck:
            test:
                [
                    "CMD",
                    "redis-cli",
                    "-a",
                    "${REDIS_PASSWORD:-devpassword_change_in_prod}",
                    "--no-auth-warning",
                    "ping",
                ]
            interval: 30s
            timeout: 3s
            retries: 3
        networks:
            - backend

    api:
        build:
            context: .
            dockerfile: apps/api/Dockerfile
        restart: unless-stopped
        ports:
            - "127.0.0.1:3000:3000"
        environment:
            NODE_ENV: production
            LOG_LEVEL: ${LOG_LEVEL:-warn}
            DATABASE_HOST: postgres
            DATABASE_PORT: 5432
            DATABASE_NAME: ${DATABASE_NAME}
            DATABASE_USER: ${DATABASE_USER}
            DATABASE_PASSWORD: ${DATABASE_PASSWORD}
            REDIS_HOST: redis
            REDIS_PORT: 6379
            REDIS_PASSWORD: ${REDIS_PASSWORD:-devpassword_change_in_prod}
            JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
            JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-30d}
            API_PORT: 3000
            SMTP_HOST: ${SMTP_HOST}
            SMTP_PORT: ${SMTP_PORT}
            SMTP_USER: ${SMTP_USER}
            SMTP_PASS: ${SMTP_PASS}
            EMAIL_FROM_NAME: ${EMAIL_FROM_NAME}
            ADMIN_URL: ${ADMIN_URL}
            RATE_LIMIT_GLOBAL_MAX: ${RATE_LIMIT_GLOBAL_MAX:-1000}
            RATE_LIMIT_IP_MAX: ${RATE_LIMIT_IP_MAX:-60}
            RATE_LIMIT_SITE_MAX: ${RATE_LIMIT_SITE_MAX:-200}
            CORS_ORIGINS: ${CORS_ORIGINS}
            IP_API_KEY: ${IP_API_KEY}
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        networks:
            - backend
            - frontend
        healthcheck:
            test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:3000/health"]
            interval: 30s
            timeout: 10s
            retries: 3
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"

    worker:
        build:
            context: .
            dockerfile: apps/worker/Dockerfile
        restart: unless-stopped
        environment:
            NODE_ENV: production
            DATABASE_HOST: postgres
            DATABASE_PORT: 5432
            DATABASE_NAME: ${DATABASE_NAME}
            DATABASE_USER: ${DATABASE_USER}
            DATABASE_PASSWORD: ${DATABASE_PASSWORD}
            REDIS_HOST: redis
            REDIS_PORT: 6379
            REDIS_PASSWORD: ${REDIS_PASSWORD:-devpassword_change_in_prod}
            SMTP_HOST: ${SMTP_HOST}
            SMTP_PORT: ${SMTP_PORT}
            SMTP_USER: ${SMTP_USER}
            SMTP_PASS: ${SMTP_PASS}
            EMAIL_FROM_NAME: ${EMAIL_FROM_NAME}
            IP_API_KEY: ${IP_API_KEY}
        depends_on:
            api:
                condition: service_healthy
        networks:
            - backend
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"

    admin:
        build:
            context: .
            dockerfile: apps/admin/Dockerfile
            args:
                VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        restart: unless-stopped
        ports:
            - "127.0.0.1:3001:80"
        networks:
            - frontend
        logging:
            driver: "json-file"
            options:
                max-size: "5m"
                max-file: "2"

    # caddy:  # COMMENTED OUT - Main Caddy on VPS handles all routing
    #     image: caddy:2-alpine
    #     restart: unless-stopped
    #     ports:
    #         - "80:80"
