    #         - "443:443/udp" # HTTP/3
    #     environment:
    #         DOMAIN: ${DOMAIN}
    #     volumes:
    #         - ./Caddyfile:/etc/caddy/Caddyfile
    #         - caddy_data:/data
    #         - caddy_config:/config
    #     depends_on:
    #         - api
    #         - admin
    #     networks:
    #         - frontend

volumes:
    postgres_data:
        driver: local
    redis_data:
        driver: local
    caddy_data:
        driver: local
    caddy_config:
        driver: local

networks:
    frontend:
        driver: bridge
    backend:
        driver: bridge
